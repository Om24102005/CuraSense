<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Future Website</title>

    <!-- Inlining the styles here guarantees the browser reads them -->
    <style>
        @font-face {
            font-family: 'Sport Future';
            /* Looks for the font files in the exact same folder as this HTML file */
            src: url('./SportFuture.woff2') format('woff2'),
                url('./SportFuture.woff') format('woff'),
                url('./SportFuture.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        *,
        *::before,
        *::after,
        html,
        body,
        button,
        input,
        select,
        textarea {
            font-family: 'Sport Future', sans-serif !important;
        }
    </style>
</head>

<body>
    <h1>
        CLINICAL<br>
        PRECISION<br>
        REDEFINED.
    </h1>
    <p>Every single written element on this website is now using the Sport Future font.</p>
    <form>
        <input type="text" placeholder="Type here...">
        <button type="button">Submit</button>
    </form>
</body>

</html>
